workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APPLE_ID: "bhelenahernandez@icloud.com"
        APPLE_PASSWORD: "ebeg-alnb-lwur-gnzy"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
          source: true
    scripts:
      - name: Set up Flutter
        script: |
          flutter pub get
      - name: Install iOS dependencies
        script: |
          cd ios
          pod install
          cd ..
      - name: Build iOS
        script: |
          flutter build ipa
    artifacts:
      - build/ios/iphoneos/*.app
    publishing:
      email:
        recipients:
          - owner@example.com
