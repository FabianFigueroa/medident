name: medident
description: "Multiplataforma dental y medica."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons:
  camera: ^0.12.0
  connectivity_plus: ^7.0.0
  cached_network_image: ^3.4.0
  carousel_slider: ^5.1.1
  video_player:
  shared_preferences:
  intl: ^0.20.2
  hugeicons: ^1.0.0
  provider: ^6.0.0
  flutter_speed_dial: ^7.0.0
  flutter_svg: ^2.0.10+1
  timeago: ^3.6.1
  percent_indicator: ^4.2.5
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  scrollable_positioned_list: ^0.3.8
  google_fonts: ^8.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  google_sign_in: ^7.2.0
  geolocator: ^14.0.2
  flutter_blue_plus: ^2.2.1
  flutter_launcher_icons:
  flutter_slidable: ^3.1.0
  #firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  firebase_storage: ^13.1.0
  cloud_firestore: ^6.1.3
  firebase_database: ^12.0.0
  table_calendar: ^3.2.0
  shimmer: ^3.0.0
  http: ^1.2.0
  speech_to_text: ^7.0.0
  lottie: ^3.3.1
  rive: ^0.13.20
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^18.0.1
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  image_cropper: ^12.2.1
  


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
flutter:

  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/videos/
    - assets/logos/
    - assets/svg/
    - assets/svg/onboard/
    - assets/rive/
    - assets/animations/
    - assets/banners/

  fonts:
    - family: Angeline
      fonts:
        - asset: assets/fonts/Angeline.ttf
          weight: 100
    - family: Oswald
      fonts:
        - asset: assets/fonts/Oswald.ttf
          weight: 100
    - family: Pacifico
      fonts:
        - asset: assets/fonts/Pacifico.ttf
          weight: 100
    - family: Krinkes
      fonts:
        - asset: assets/fonts/Krinkes.ttf
          weight: 100
    - family: Ubuntu-Light
      fonts:
        - asset: assets/fonts/Ubuntu-Light.ttf
          weight: 200
    - family: Ubuntu-Regular
      fonts:
        - asset: assets/fonts/Ubuntu-Regular.ttf
          weight: 400
    - family: Ubuntu-Bold
      fonts:
        - asset: assets/fonts/Ubuntu-Bold.ttf
          weight: 600
    - family: Ubuntu-Medium
      fonts:
        - asset: assets/fonts/Ubuntu-Medium.ttf
          weight: 600
